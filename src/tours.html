<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RedXBattles</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="navbar">
   
    <a class="brand" href="index.html"> <img src="img/logo.png"  class="brand-badge"  alt="logo"><span>RedXBattles</span></a>
    <div class="nav-links">
      <a href="tournaments.html">Button 1</a>
      <a href="leaderboard.html">Button 2</a>
      <a href="announcements.html">Button 3</a>
    </div>
   <label class="switch">
  <input id="input" type="checkbox" checked="darkTheme" />
  <div class="slider round">
    <div class="sun-moon">
      <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-2" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-3" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>

      <svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-5" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
    </div>
    <div class="stars">
      <svg id="star-1" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-2" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-3" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-4" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
    </div>
  </div>
</label>

    <div class="nav-actions">
      <a class="btn" href="profile.html">Login/profile</a>
      
    </div>
  </div>

  <div class="container">
    <div class="h1">Турніри</div>
    <div class="muted">Активні / майбутні / завершені</div>

    <div style="height:16px"></div>

    <div class="card">
      <div class="row">
        <div class="field">
          <label>Фільтр</label>
          <select class="select">
            <option>Усі</option>
            <option>Registration open</option>
            <option>Running</option>
            <option>Finished</option>
          </select>
        </div>
        <div class="field">
          <label>Пошук</label>
          <input class="input" placeholder="Назва турніру..." />
        </div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;">
          <b>CodeBattle #1</b>
          <span class="badge badge-warn">Registration</span>
        </div>
        <div class="muted" style="margin-top:8px;">Короткий опис / правила...</div>
        <div style="margin-top:12px;display:flex;gap:10px;">
          <a class="btn" href="tournament.html">Відкрити</a>
          <a class="btn btn-primary" href="team-register.html">Реєстрація команди</a>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;">
          <b>CodeBattle #0</b>
          <span class="badge badge-ok">Finished</span>
        </div>
        <div class="muted" style="margin-top:8px;">Архівний турнір...</div>
        <div style="margin-top:12px;display:flex;gap:10px;">
          <a class="btn" href="tournament.html">Відкрити</a>
          <a class="btn" href="leaderboard.html">Рейтинг</a>
        </div>
      </div>
    </div>
  </div>

 
</body>
</html>
