<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Реєстрація команди — RedXBattles</title>
<link rel="stylesheet" href="css/style.min.css">
<link rel="icon" type="image/x-icon" href="img/logo.png">
</head>
<body>

   <!-- NAV -->
 <div class="navbar">

  <!-- LEFT -->
  <a class="navbar__brand" href="index.html">
    <img src="img/logo.png" class="navbar__brand__badge" alt="logo">
    <span>RedXBattles</span>
  </a>

  <!-- CENTER -->
  <div class="navbar__links">
    <a href="tournaments.html">Button 1</a>
    <a href="leaderboard.html">Button 2</a>
    <a href="announcements.html">Button 3</a>
  </div>

  <!-- RIGHT -->
  <div class="navbar__right">

    <iframe src="_switch.html" class="header-frame" scrolling="no"></iframe>

    <div class="nav__actions">
      <a class="btn" href="login.html">Login/profile</a>
      
    </div>  

  </div>

</div>

<div class="container" style="max-width: 820px;">
  <div class="h1">Турнір: GayTournament #1</div>
  <div class="form__muted">Реєстрація команди</div>

  <div style="height:16px"></div>

  <div class="card" style="max-width:800px;">
    
    <div class="container__field">
      <label>Назва команди</label>
      <input class="form__input" placeholder="Team Avengers">
    </div>

    <div style="height:12px"></div>

    <b>Капітан</b>
    <div class="grid__row" style="margin-top:8px;">
      <div class="form__field">
        <label>ПІБ</label>
        <input class="form__input" placeholder="Іван Іваненко">
      </div>
      <div class="form__field">
        <label>Email</label>
        <input class="form__input" placeholder="captain@email.com">
      </div>
      <div class="form__field">
        <label>Telegram</label>
        <input class="form__input" placeholder="@artBond_13">
      </div>
      <div class="form__field">
        <label>Школа</label>
        <input class="form__input" placeholder="Школа №123">
      </div>
       <div class="form__field">
        <label>Клас</label>
        <input class="form__input" placeholder="10">
      </div>
    </div>

    <div style="height:12px"></div>

    <b>Учасники</b>

    <div class="grid__row" style="margin-top:8px;">
      <div class="form__field">
        <label>ПІБ</label>
        <input class="form__input" placeholder="Учасник 1">
      </div>
      <div class="form__field">
        <label>Email</label>
        <input class="form__input" placeholder="member1@email.com">
      </div>
      <div class="form__field">
        <label>Школа</label>
        <input class="form__input" placeholder="Школа №123">
      </div>
      <div class="form__field">
        <label>Клас</label>
        <input class="form__input" placeholder="10">
      </div>
    </div>

    <div class="grid__row">
      <div class="form__field">
        <label>ПІБ</label>
        <input class="form__input" placeholder="Учасник 2">
      </div>
      <div class="form__field">
        <label>Email</label>
        <input class="form__input" placeholder="member2@email.com">
      </div>
      <div class="form__field">
        <label>Школа</label>
        <input class="form__input" placeholder="Школа №123">
      </div>
      <div class="form__field">
        <label>Клас</label>
        <input class="form__input" placeholder="10">
      </div>
    </div>

    <button class="btn" style="margin-top:10px;">+ Додати учасника</button>

    <div style="height:16px"></div>

    <div class="grid__row">
      <div class="form__field">
        <label>Місто</label>
        <input class="form__input" placeholder="Київ">
      </div>
      <div class="form__field">
        <label>Країна</label>
        <input class="form__input" placeholder="Зімбабве">
      </div>
      
    </div>

    <div style="height:16px"></div>

    <button class="btn btn__primary">Зареєструвати команду</button>

  </div>
</div>


</body>
<script src="js/theme.js" defer></script>
</html>
