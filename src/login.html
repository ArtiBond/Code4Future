<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RedXBattles</title>
  
  <link rel="stylesheet" href="css/style.min.css">
 
</head>
<body>

 
  <div class="navbar" style="justify-content: center;">
    <a class="navbar__brand" href="index.html">
      <img src="img/logo.png"  class="navbar__brand__badge"  alt="logo">
      <span>RedXBattles</span>
    </a>
   
    
  </div>

  
  <div class="glitch__form" >
    <form class="glitch__card" action = "/login" method="POST">

      <div class="card__header">
        <div class="card__title">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
            <path d="M14 3v4a1 1 0 0 0 1 1h4"></path>
            <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"></path>
          </svg>
          <span>Вхід</span>
        </div>
        <div class="card__dots"><span></span><span></span><span></span></div>
      </div>

      <div class="card__body">

        

        <div class="form__group">
          <input type="email" id="email" name="email" required placeholder=" " />
          <label for="email" class="form__label" data-text="EMAIL">EMAIL</label>
        </div>

    

       
          <div class="form__group">
            <input type="password" id="password" name="password" required placeholder=" " />
            <label for="password" class="form__label" data-text="ПАРОЛЬ">ПАРОЛЬ</label>
          </div>

          
      

        <button data-text="УВІЙТИ" type="submit" class="form__sbmtbutton">
          <span class="form__sbmtbutton__text">Увійти</span>
        </button>

        <div class="form__muted" style="font-size: 17px;">
          Не маєте акаунту? <a href="register">Зареєструватися</a>
        </div>

      </div>
    </form>
  </div>
<div class="google">
<button class="google__im" style="color: #00f2ea;">
  Sign in with Google
  <span class="google__icon">
    <svg viewBox="0 0 48 48">
      <title>Google Logo</title>
      <clipPath id="g">
        <path
          d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"
        ></path>
      </clipPath>
      <g clip-path="url(#g)" class="colors">
        <path d="M0 37V11l17 13z" fill="#FBBC05"></path>
        <path d="M0 11l17 13 7-6.1L48 14V0H0z" fill="#EA4335"></path>
        <path d="M0 37l30-23 7.9 1L48 0v48H0z" fill="#34A853"></path>
        <path d="M48 48L17 24l-4-3 35-10z" fill="#4285F4"></path>
      </g>
    </svg>
  </span>
</button>
</div>
</body>
<script src="js/theme.js" defer></script>
</html>
