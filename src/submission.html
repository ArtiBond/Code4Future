<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Сабміт — RedXBattles</title>
  <link rel="stylesheet" href="css/style.min.css" />
</head>
<body>
   <!-- NAV -->
 <div class="navbar">

  <!-- LEFT -->
  <a class="navbar__brand" href="index.html">
    <img src="img/logo.png" class="navbar__brand__badge" alt="logo">
    <span>RedXBattles</span>
  </a>

  <!-- CENTER -->
  <div class="navbar__links">
    <a href="tournaments.html">Button 1</a>
    <a href="leaderboard.html">Button 2</a>
    <a href="announcements.html">Button 3</a>
  </div>

  <!-- RIGHT -->
  <div class="navbar__right">

    <label class="switch">
      <input id="themeToggle" type="checkbox" />
      <div class="switch__slider round">

        <div class="switch__sun-moon">
          <svg id="moon-dot-1" class="switch__moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="moon-dot-2" class="switch__moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="moon-dot-3" class="switch__moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>

          <svg id="light-ray-1" class="switch__light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="light-ray-2" class="switch__light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="light-ray-3" class="switch__light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>

          <svg id="cloud-1" class="switch__cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="cloud-2" class="switch__cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="cloud-3" class="switch__cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>

          <svg id="cloud-4" class="switch__cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="cloud-5" class="switch__cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
          <svg id="cloud-6" class="switch__cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
        </div>

        <div class="stars">
          <svg id="star-1" class="switch__star" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path>
          </svg>
          <svg id="star-2" class="switch__star" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 15 , -5 -5 C -5 -5, -5 -5, -5 -5 C -5 -5, -5 -5, -5 -5 C -5 -5, -5 -5, -5 -5 Z"></path>
          </svg>
          <svg id="star-3" class="switch__star" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path>
          </svg>
          <svg id="star-4" class="switch__star" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 15,5 -5 ,5 -5 C -5 -5, -5 -5, -5 -5 C -5 -5, -5 -5, -5 -5 C -5 -5, -5 -5, -5 -5 Z"></path>
          </svg>
        </div>

      </div>
    </label>

    <div class="nav__actions">
      <a class="btn" href="login.html">Login/profile</a>
      
    </div>  

  </div>

</div>
  <div class="container" style="max-width: 820px;">
    <div class="h1">Подача результатів</div>
    <div class="form__muted">До дедлайну можна редагувати</div>

    <div style="height:16px"></div>

    <div class="card" style="max-width:720px;">
      <div class="grid">
        <div class="form__field">
          <label>GitHub репозиторій (обовʼязково)</label>
          <input class="form__input" placeholder="https://github.com/user/repo" />
        </div>

        <div class="form__field">
          <label>Відео демо (обовʼязково)</label>
          <input class="form__input" placeholder="https://youtube.com/... або Drive link" />
        </div>

        <div class="form__field">
          <label>Live demo (опціонально)</label>
          <input class="form__input" placeholder="https://..." />
        </div>

        <div class="form__field">
          <label>Короткий опис</label>
          <textarea class="form__textarea" placeholder="Що зроблено, як запускати..."></textarea>
        </div>

<div class="container__folder">
  
    <div class="front-side">
      <div class="tip"></div>
      <div class="cover"></div>
    </div>
    <div class="back-side cover"></div>
  
  <label class="custom-file-upload">
    <input class="title" type="file" />
    Upload a File
  </label>
</div>

        <div style="display:flex;gap:10px;justify-content: space-between;">
          <button class="btn">Зберегти чернетку</button>
          <button class="btn btn__primary">Відправити</button>
        </div>
      </div>
    </div>
  </div>


</body>
<script src="../theme.js"></script>
</html>
