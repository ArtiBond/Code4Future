<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — RedXBattles</title>
  
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>
   <!-- NAV -->
 <div class="navbar">

  <!-- LEFT -->
  <a class="navbar__brand" href="index.html">
    <img src="img/logo.png" class="navbar__brand__badge" alt="logo">
    <span>RedXBattles</span>
  </a>

  <!-- CENTER -->
  <div class="navbar__links">
    <a href="tournaments.html">Button 1</a>
    <a href="leaderboard.html">Button 2</a>
    <a href="announcements.html">Button 3</a>
  </div>

  <!-- RIGHT -->
  <div class="navbar__right">

    <iframe src="_switch.html" class="header-frame" scrolling="no"></iframe>

    <div class="nav__actions">
      <a class="btn" href="login.html">Login/profile</a>
      
    </div>  

  </div>

</div>
  <div class="container">
    <div class="h1">Адмін-панель</div>
    <div class="form__muted">Керування турнірами/тасками/журі</div>

    <div style="height:16px"></div>

    <div class="grid grid__2">
      <div class="card" style="display: flex; flex-direction: column;">
        <b>Створити турнір</b>
        <div style="height:12px"></div>
        <div class="form__field"><label>Назва</label><input class="form__input" placeholder="CodeBattle #2"></div>
        <div class="form__field"><label>Опис/правила</label><textarea class="form__textarea"></textarea></div>
        <div class="form__row">
          <div class="form__field"><label>Reg open</label><input class="form__input" placeholder="2026-02-20 18:00"></div>
          <div class="form__field"><label>Reg close</label><input class="form__input" placeholder="2026-02-25 18:00"></div>
        </div>
        <div class="form__row">
          <div class="form__field"><label>Max teams</label><input class="form__input" type="number" placeholder="50"></div>
          <div class="form__field"><label>Status</label>
            <select class="form__select">
              <option>Draft</option><option>Registration</option>
            </select>
          </div>
        </div>
        <div class="form__field"><label>Призначити журі</label><input class="form__input" placeholder="Попик А."></div>
        <button class="btn btn__primary" style="margin-top: 6px;">Створити</button>
      </div>

      <div class="card">
        <b>Турніри</b>
        <div style="height:12px"></div>
        <table class="table">
          <thead><tr><th>Назва</th><th>Статус</th><th></th></tr></thead>
          <tbody>
            <tr>
              <td>CodeBattle #1</td>
              <td><span class="badge badge-warn">Running</span></td>
              <td><button class="btn">Edit</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>


</body>
<script src="js/theme.js" defer></script>
</html>
