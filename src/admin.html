<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — RedXBattles</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
 <div class="navbar">
   
    <a class="brand" href="index.html"> <img src="img/logo.png"  class="brand-badge"  alt="logo"><span>RedXBattles</span></a>
    <div class="nav-links">
      <a href="tournaments.html">Button 1</a>
      <a href="leaderboard.html">Button 2</a>
      <a href="announcements.html">Button 3</a>
    </div>
    <label class="switch">
  <input id="themeToggle" type="checkbox" />
  <div class="slider round">
    <div class="sun-moon">
      <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-2" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-3" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>

      <svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-5" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
    </div>
    <div class="stars">
      <svg id="star-1" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-2" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-3" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-4" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
    </div>
  </div>
</label>

    <div class="nav-actions">
      <a class="btn" href="login.html">Login/profile</a>
      
    </div>
  </div>
  <div class="container">
    <div class="h1">Адмін-панель</div>
    <div class="muted">Керування турнірами/тасками/журі</div>

    <div style="height:16px"></div>

    <div class="grid grid-2">
      <div class="card" style="display: flex; flex-direction: column;">
        <b>Створити турнір</b>
        <div style="height:12px"></div>
        <div class="field"><label>Назва</label><input class="input" placeholder="CodeBattle #2"></div>
        <div class="field"><label>Опис/правила</label><textarea class="textarea"></textarea></div>
        <div class="row">
          <div class="field"><label>Reg open</label><input class="input" placeholder="2026-02-20 18:00"></div>
          <div class="field"><label>Reg close</label><input class="input" placeholder="2026-02-25 18:00"></div>
        </div>
        <div class="row">
          <div class="field"><label>Max teams</label><input class="input" type="number" placeholder="50"></div>
          <div class="field"><label>Status</label>
            <select class="select">
              <option>Draft</option><option>Registration</option>
            </select>
          </div>
        </div>
        <div class="field"><label>Призначити журі</label><input class="input" placeholder="Попик А."></div>
        <button class="btn btn-primary" style="margin-top: 6px;">Створити</button>
      </div>

      <div class="card">
        <b>Турніри</b>
        <div style="height:12px"></div>
        <table class="table">
          <thead><tr><th>Назва</th><th>Статус</th><th></th></tr></thead>
          <tbody>
            <tr>
              <td>CodeBattle #1</td>
              <td><span class="badge badge-warn">Running</span></td>
              <td><button class="btn">Edit</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>


</body>
<script src="../theme.js"></script>
</html>
