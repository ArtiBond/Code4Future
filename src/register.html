<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RedXBattles</title>
  
  <link rel="stylesheet" href="css/style.min.css">
  <link rel="icon" type="image/x-icon" href="img/logo.png">
  <link rel="icon" type="image/x-icon" href="img/logo.png">

</head>
<body>

  
   <!-- NAV -->
 <div class="navbar">

  <!-- LEFT -->
  <a class="navbar__brand" href="/">
    <img src="img/logo.png" class="navbar__brand__badge" alt="logo">
    <span>RedXBattles</span>
  </a>

  <!-- CENTER -->
  <div class="navbar__links">
    <a href="tournaments" id="btn-1">Button 1</a>
    <a href="leaderboard" id="btn-2">Button 2</a>
    <a href="announcements" id="btn-3">Button 3</a>
  </div>

  <!-- RIGHT -->
  <div class="navbar__right">

    <iframe src="_switch.html" class="header-frame" scrolling="no"></iframe>

    <div class="nav__actions">
      <a class="btn" href="login" id="btn-login">Login</a>
      <a class="btn btn__primary" href="profile" style="border-radius: 50%; display: none;" id="btn-profile">P</a>
      
    </div>  

  </div>

</div>

  
  <div class="glitch__form">
    <form class="glitch__card" action="/register" method="POST">

      <div class="card__header">
        <div class="card__title">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
            <path d="M14 3v4a1 1 0 0 0 1 1h4"></path>
            <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"></path>
          </svg>
          <span>Реєстрація</span>
        </div>
        <div class="card__dots"><span></span><span></span><span></span></div>
      </div>

      <div class="card__body">

        <div class="form__group">
          <input type="text" id="name" name="name" required placeholder=" " />
          <label for="name" class="form__label" data-text="ІМʼЯ">Нікнейм</label>
        </div>

        <div class="form__group">
          <input type="email" id="email" name="email" required placeholder=" " />
          <label for="email" class="form__label" data-text="EMAIL">EMAIL</label>
        </div>

<div class="form__group countryfield">
  <!-- реальний select для форми -->
  <select id="countrySelect" name="country" required class="countryfield__select">
    <option value="" disabled selected>Оберіть країну</option>
  </select>

  <!-- “фейковий” інпут як select -->
  <div class="countryfield__combo" id="countryCombo">
    <input
      type="text"
      class="countryfield__input"
      placeholder=" " 
      autocomplete="off"
    />
    <span class="countryfield__caret">▾</span>

    <div class="countryfield__dropdown" hidden>
      <ul class="countryfield__list"></ul>
    </div>
  </div>

  <label for="countrySelect" class="form__label" data-text="КРАЇНА">Країна</label>
</div>

        <div class="form__group">
          <select id="select" name="role" required class="nice-select">
            <option value="" disabled selected> </option>
            <option>Учасник</option>
            <option>Капітан</option>
            <option>Журі</option>
            <option>Адміністратор</option>
          </select>
          <label for="select" class="form__label" data-text="РОЛЬ">РОЛЬ</label>
        </div>

        <div class="form-row">
          <div class="form__group">
            <input type="password" id="password" name="password" required placeholder=" " />
            <label for="password" class="form__label" data-text="ПАРОЛЬ">ПАРОЛЬ</label>
          </div>

          <div class="form__group">
            <input type="password" id="confirm" name="confirm" required placeholder=" " />
            <label for="confirm" class="form__label" data-text="ПІДТВЕРДЖЕННЯ">
              ПІДТВЕРДЖЕННЯ
            </label>
          </div>
        </div>

        <button data-text="ЗАРЕЄСТРУВАТИСЬ" type="submit" class="form__sbmtbutton">
          <span class="form__sbmtbutton__text">ЗАРЕЄСТРУВАТИСЬ</span>
        </button>

        <div class="form__muted" style="font-size: 17px;">
          Вже є акаунт? <a href="login">Увійти</a>
        </div>

      </div>
    </form>
  </div>

</body>
<script src="js/theme.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/userscheck.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
  const EXCLUDE = new Set(["RUS", "IRN", "USA"]);

  const select = document.querySelector("#countrySelect");
  const combo = document.querySelector("#countryCombo");
  const input = combo.querySelector(".countryfield__input");
  const dropdown = combo.querySelector(".countryfield__dropdown");
  const list = combo.querySelector(".countryfield__list");

  let all = [];

  function getUkName(c) {
    return c?.translations?.ukr?.common || c?.name?.common || c.cca3;
  }

  function openDropdown() { dropdown.hidden = false; }
  function closeDropdown() { dropdown.hidden = true; }

  function render(items) {
    list.innerHTML = "";

    if (!items.length) {
      const li = document.createElement("li");
      li.className = "countryfield__item";
      li.textContent = "Нічого не знайдено";
      li.style.cursor = "default";
      list.appendChild(li);
      return;
    }

    for (const c of items) {
      const li = document.createElement("li");
      li.className = "countryfield__item";

      li.className = "countryfield__item";
      li.dataset.value = c.cca3; // ОБОВʼЯЗКОВО

      const img = document.createElement("img");
      img.className = "countryfield__flag";
      img.alt = `${c.label} flag`;
      img.src = c.flag;

      const span = document.createElement("span");
      span.className = "countryfield__name";
      span.textContent = c.label;

      li.appendChild(img);
      li.appendChild(span);

      li.addEventListener("click", () => {
        select.value = c.cca3;
        input.value = c.label;
        closeDropdown();
        input.blur();
      });

      list.appendChild(li);
    }
  }

  function applyFilter(q) {
    const query = q.trim().toLowerCase();
    const items = !query
      ? all
      : all.filter((c) => c.label.toLowerCase().includes(query));
    render(items);
  }

  // load
  try {
    const res = await fetch("https://restcountries.com/v3.1/all?fields=name,translations,flags,cca3");
    const data = await res.json();

    all = data
      .filter((c) => c?.cca3 && c?.flags?.png && !EXCLUDE.has(c.cca3))
      .map((c) => ({ cca3: c.cca3, label: getUkName(c), flag: c.flags.png }))
      .sort((a, b) => a.label.localeCompare(b.label, "uk"));

    // наповнюємо select для required/submit
    for (const c of all) {
      const opt = document.createElement("option");
      opt.value = c.cca3;
      opt.textContent = c.label;
      select.appendChild(opt);
    }

    render(all);
  } catch (e) {
    console.error("Countries load failed:", e);
  }

  // events
  input.addEventListener("focus", () => {
    openDropdown();
    applyFilter(input.value);
  });

  input.addEventListener("click", () => {
    openDropdown();
    applyFilter(input.value);
    const group = select.closest(".form__group");
group.classList.add("countryfield--filled");
  });

  input.addEventListener("input", () => {
  dropdown.hidden = false;
  applyFilter(input.value);

  if (!input.value.trim()) {
    select.value = "";
    group.classList.remove("countryfield--filled");
  }
});

  document.addEventListener("click", (e) => {
    if (!combo.contains(e.target)) closeDropdown();
    const group = select.closest(".form__group"); // додай один раз зверху після select

// всередині click:
group.classList.add("countryfield--filled");
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeDropdown();
  });

  
});

const group = select.closest(".form__group");

// клік по елементах списку країн
list.addEventListener("click", (e) => {
  const item = e.target.closest(".countryfield__item");
  if (!item) return;

  const value = item.dataset.value;            // напр. "UKR"
  const label = item.querySelector(".countryfield__name")?.textContent?.trim();

  if (!value || !label) return;

  select.value = value;
  input.value = label;

  group.classList.add("countryfield--filled"); // <-- оце головне
  dropdown.hidden = true;
  input.blur(); // щоб фокус знявся і глітч відпустив
});


</script>
</html>
