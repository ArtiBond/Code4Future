<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RedXBattles</title>
  
  <link rel="stylesheet" href="css/style.min.css">
  <link rel="icon" type="image/x-icon" href="img/logo.png">

</head>
<body>

  
  <div class="navbar" style="justify-content: center;">
    <a class="navbar__brand" href="index.html">
      <img src="img/logo.png"  class="navbar__brand__badge"  alt="logo">
      <span>RedXBattles</span>
    </a>
   
    
  </div>

  
  <div class="glitch__form">
    <form class="glitch__card" action="/register" method="POST">

      <div class="card__header">
        <div class="card__title">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
            <path d="M14 3v4a1 1 0 0 0 1 1h4"></path>
            <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"></path>
          </svg>
          <span>Реєстрація</span>
        </div>
        <div class="card__dots"><span></span><span></span><span></span></div>
      </div>

      <div class="card__body">

        <div class="form__group">
          <input type="text" id="name" name="nickname" required placeholder=" " />
          <label for="name" class="form__label" data-text="ІМʼЯ">Нікнейм</label>
        </div>

        <div class="form__group">
          <input type="email" id="email" name="email" required placeholder=" " />
          <label for="email" class="form__label" data-text="EMAIL">EMAIL</label>
        </div>

       <div class="form__group">
          <select id="select" name="country" required>
            <option value="" disabled selected>Оберіть країну</option>
            <option>Україна</option>
            <option>Польща</option>
            <option>Зімбабве</option>
          </select>
          <label for="select" class="form__label" data-text="КРАЇНА">Країна</label>
        </div>

        <div class="form__group">
          <select id="select" name="role" required>
            <option value="" disabled selected>Оберіть роль</option>
            <option>Учасник (команда)</option>
            <option>Журі</option>
            <option>Адміністратор</option>
          </select>
          <label for="select" class="form__label" data-text="РОЛЬ">РОЛЬ</label>
        </div>

        <div class="form-row">
          <div class="form__group">
            <input type="password" id="password" name="password" required placeholder=" " />
            <label for="password" class="form__label" data-text="ПАРОЛЬ">ПАРОЛЬ</label>
          </div>

          <div class="form__group">
            <input type="password" id="confirm" name="confirm" required placeholder=" " />
            <label for="confirm" class="form__label" data-text="ПІДТВЕРДЖЕННЯ">
              ПІДТВЕРДЖЕННЯ
            </label>
          </div>
        </div>

        <button data-text="ЗАРЕЄСТРУВАТИСЬ" type="submit" class="form__sbmtbutton">
          <span class="form__sbmtbutton__text">ЗАРЕЄСТРУВАТИСЬ</span>
        </button>

        <div class="form__muted" style="font-size: 17px;">
          Вже є акаунт? <a href="login">Увійти</a>
        </div>

      </div>
    </form>
  </div>

</body>
</html>
