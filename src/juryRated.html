<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Оцінювання — RedXBattles</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="navbar">
   
    <a class="brand" href="index.html"> <img src="img/logo.png"  class="brand-badge"  alt="logo"><span>RedXBattles</span></a>
    <div class="nav-links">
      <a href="tournaments.html">Button 1</a>
      <a href="leaderboard.html">Button 2</a>
      <a href="announcements.html">Button 3</a>
    </div>
   <label class="switch">
  <input id="themeToggle" type="checkbox" />
  <div class="slider round">
    <div class="sun-moon">
      <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-2" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="light-ray-3" class="light-ray" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>

      <svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-5" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
      <svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
    </div>
    <div class="stars">
      <svg id="star-1" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-2" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-3" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
      <svg id="star-4" class="star" viewBox="0 0 20 20">
        <path
          d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
        ></path>
      </svg>
    </div>
  </div>
</label>

    <div class="nav-actions">
      <a class="btn" href="login.html">Login/profile</a>
      
    </div>
  </div>

  <div class="container">
    <div class="h1">Оцінювання</div>
    <div class="muted">Команда: MyTeam • Завдання: Round 1</div>

    <div style="height:16px"></div>

    <div class="grid grid-2">
      <div class="card">
        <b>Посилання</b>
        <div class="muted" style="margin-top:10px;">
          GitHub: <a style="color:var(--accent)" href="#">https://github.com/...</a><br/>
          Відео: <a style="color:var(--accent)" href="#">https://youtube.com/...</a>
        </div>
      </div>

      <div class="card">
        <b>Підсумок</b>
        <div class="muted" style="margin-top:10px;">
          Технічна: 0<br/>
          Функціональність: 0<br/>
          <b>Разом: 0</b>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <b>Бали (0–100)</b>
      <div style="height:12px"></div>

      <div class="grid grid-2">
        <div>
          <div class="field"><label>Backend якість коду</label><input class="input" type="number" placeholder="0..100"></div>
          <div class="field"><label>Database</label><input class="input" type="number" placeholder="0..100"></div>
          <div class="field"><label>Frontend (UX/UI)</label><input class="input" type="number" placeholder="0..100"></div>
        </div>
        <div>
          <div class="field"><label>Must have</label><input class="input" type="number" placeholder="0..100"></div>
          <div class="field"><label>Роботоздатність</label><input class="input" type="number" placeholder="0..100"></div>
          <div class="field"><label>Зручність використання</label><input class="input" type="number" placeholder="0..100"></div>
        </div>
      </div>

      <div class="field">
        <label>Коментар (опціонально)</label>
        <textarea class="textarea" placeholder="Ваші зауваження..."></textarea>
      </div>

      <div style="display:flex;gap:10px;margin-top: 10px;
    justify-content: space-between;">
        <button class="btn">Зберегти</button>
        <button class="btn btn-primary">Відправити оцінку</button>
      </div>
    </div>
  </div>


</body>
<script src="../theme.js"></script>
</html>
