<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Оцінювання — RedXBattles</title>
  <link rel="stylesheet" href="css/style.min.css" />
  <link rel="icon" type="image/x-icon" href="img/logo.png">
</head>
<body>
   <!-- NAV -->
 <div class="navbar">

  <!-- LEFT -->
  <a class="navbar__brand" href="/">
    <img src="img/logo.png" class="navbar__brand__badge" alt="logo">
    <span>RedXBattles</span>
  </a>

  <!-- CENTER -->
  <div class="navbar__links">
    <a href="tournaments" id="btn-1">Button 1</a>
    <a href="leaderboard" id="btn-2">Button 2</a>
    <a href="announcements" id="btn-3">Button 3</a>
  </div>
  <!-- RIGHT -->
  <div class="navbar__right">

    <iframe src="_switch.html" class="header-frame" scrolling="no"></iframe>

    <div class="nav__actions">
     <a class="btn" href="login" id="btn-login">Login</a>
      <a class="btn btn__primary" href="profile" style="border-radius: 50%; display: none;" id="btn-profile">P</a>
    </div>  

  </div>

</div>

  <div class="container">
    <div class="h1">Оцінювання</div>
    <div class="form__muted">Команда: MyTeam • Завдання: Round 1</div>

    <div style="height:16px"></div>

    <div class="grid grid__2">
      <div class="card">
        <b>Посилання</b>
        <div class="form__muted" style="margin-top:10px;">
          GitHub: <a style="color:var(--accent)" href="#">https://github.com/...</a><br/>
          Відео: <a style="color:var(--accent)" href="#">https://youtube.com/...</a>
        </div>
      </div>

      <div class="card">
        <b>Підсумок</b>
        <div class="form__muted" style="margin-top:10px;">
          Технічна: 0<br/>
          Функціональність: 0<br/>
          <b>Разом: 0</b>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <b>Бали (0–100)</b>
      <div style="height:12px"></div>

      <div class="grid grid__2">
        <div>
          <div class="form__field"><label>Backend якість коду</label><input class="form__input" type="number" placeholder="0..100"></div>
          <div class="form__field"><label>Database</label><input class="form__input" type="number" placeholder="0..100"></div>
          <div class="form__field"><label>Frontend (UX/UI)</label><input class="form__input" type="number" placeholder="0..100"></div>
        </div>
        <div>
          <div class="form__field"><label>Must have</label><input class="form__input" type="number" placeholder="0..100"></div>
          <div class="form__field"><label>Роботоздатність</label><input class="form__input" type="number" placeholder="0..100"></div>
          <div class="form__field"><label>Зручність використання</label><input class="form__input" type="number" placeholder="0..100"></div>
        </div>
      </div>

      <div class="form__field">
        <label>Коментар (опціонально)</label>
        <textarea class="form__textarea" placeholder="Ваші зауваження..."></textarea>
      </div>

      <div style="display:flex;gap:10px;margin-top: 10px;
    justify-content: space-between;">
        <button class="btn">Зберегти</button>
        <button class="btn btn__primary">Відправити оцінку</button>
      </div>
    </div>
  </div>


</body>
<script src="js/theme.js" defer></script>
<script src="js/userscheck.js" defer></script>
</html>
