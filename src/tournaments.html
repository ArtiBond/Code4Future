<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RedXBattles</title>
  <link rel="stylesheet" href="css/style.min.css" />
  <link rel="icon" type="image/x-icon" href="img/logo.png">
</head>
<body>
   <!-- NAV -->
 <div class="navbar">

  <!-- LEFT -->
  <a class="navbar__brand" href="index.html">
    <img src="img/logo.png" class="navbar__brand__badge" alt="logo">
    <span>RedXBattles</span>
  </a>

  <!-- CENTER -->
  <div class="navbar__links">
    <a href="tournaments" id="btn-1">Button 1</a>
    <a href="leaderboard" id="btn-2">Button 2</a>
    <a href="announcements" id="btn-3">Button 3</a>
  </div>

  <!-- RIGHT -->
  <div class="navbar__right">

    <iframe src="_switch.html" class="header-frame" scrolling="no"></iframe>

    <div class="nav__actions">
   <a class="btn" href="login.html" id="btn-login">Login</a>
      <a class="btn btn__primary" href="profile.html" style="border-radius: 50%; display: none;" id="btn-profile">P</a>
      
    </div>  

  </div>

</div>

  <div class="container">
    <div class="h1">Турніри</div>
    <div class="form__muted">Активні / майбутні / завершені</div>

    <div style="height:16px"></div>

    <div class="card">
      <div class="form__row">
        <div class="form__field">
          <label>Фільтр</label>
          <select class="form__select">
            <option>Усі</option>
            <option>Registration open</option>
            <option>Running</option>
            <option>Finished</option>
          </select>
        </div>
        <div class="form__field">
          <label>Пошук</label>
          <input class="form__input" placeholder="Назва турніру..." />
        </div>
      </div>
    </div>

    <div class="grid grid__2" style="margin-top:16px;">
      <div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;">
          <b>CodeBattle #1</b>
          <span class="badge badge__warn">Registration</span>
        </div>
        <div class="form__muted" style="margin-top:8px;">Короткий опис / правила...</div>
        <div class="form__row" style="margin-top:12px;display:flex;gap:10px;">
          <a class="btn" href="tournament.html">Відкрити</a>
          <a class="btn btn__primary" href="team-register.html">Реєстрація команди</a>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;">
          <b>CodeBattle #0</b>
          <span class="badge badge__ok">Finished</span>
        </div>
        <div class="form__muted" style="margin-top:8px;">Архівний турнір...</div>
        <div class="form__row" >
          <a class="btn" href="tournament.html">Відкрити</a>
          <a class="btn" href="leaderboard.html">Рейтинг</a>
        </div>
      </div>
    </div>
  </div>

 
</body>
<script src="js/theme.js" defer></script>
<script src="js/userscheck.js" defer></script>
</html>
